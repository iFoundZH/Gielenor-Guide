name: Daily Wiki Sync

on:
  schedule:
    # Every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      league-only:
        description: "Only sync league data (faster, for launch-week updates)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run league wiki sync (merge mode)
        run: npx tsx src/lib/wiki-sync.ts --merge

      - name: Run guide wiki sync
        if: inputs.league-only != true
        run: npx tsx src/lib/wiki-sync-guides.ts

      - name: Run data wiki sync (quests + bosses)
        if: inputs.league-only != true
        run: npx tsx src/lib/wiki-sync-data.ts --merge

      - name: Generate sync status
        run: npx tsx src/lib/sync-status.ts

      - name: Run data audit
        id: audit
        run: |
          npx tsx src/lib/data-audit.ts --ci > audit-report.txt 2>&1 || true
          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          cat audit-report.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Check for data changes
        id: changes
        run: |
          git diff --quiet src/data/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create PR with updated data
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="wiki-sync/$(date +%Y-%m-%d-%H%M)"
          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/
          git commit -m "chore: sync league + guide data from OSRS Wiki

          Automated daily sync run on $(date -u +%Y-%m-%dT%H:%M:%SZ).
          "
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: sync league + guide data from OSRS Wiki" \
            --body "$(cat <<EOF
          ## Summary
          - Automated daily sync of league and guide data from the OSRS Wiki
          - League sync uses \`--merge\` mode to preserve hand-curated data
          - Guide sync updates skill training, ironman, quest order, diary, and combat achievement data

          ## Data Audit
          \`\`\`
          ${{ steps.audit.outputs.report }}
          \`\`\`

          Please review the data changes in \`src/data/\` before merging.

          Generated by the daily wiki-sync workflow
          EOF
          )" \
            --base main
