name: Weekly Wiki Sync

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run wiki sync (merge mode)
        run: npx tsx src/lib/wiki-sync.ts --merge

      - name: Check for data changes
        id: changes
        run: |
          git diff --quiet src/data/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create PR with updated data
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="wiki-sync/$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/
          git commit -m "chore: sync league data from OSRS Wiki

          Automated weekly sync run on $(date -u +%Y-%m-%d).
          "
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: sync league data from OSRS Wiki" \
            --body "$(cat <<'EOF'
          ## Summary
          - Automated weekly sync of league data from the OSRS Wiki
          - Uses `--merge` mode to preserve hand-curated data where the wiki has no data

          Please review the data changes in `src/data/` before merging.

          🤖 Generated by the weekly wiki-sync workflow
          EOF
          )" \
            --base main
